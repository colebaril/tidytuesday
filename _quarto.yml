project:
  type: website
  output-dir: docs

execute:
  echo: true
  warning: false
  message: false
  fig-align: center
  fig-width: 12
  fig-asp: 0.7
  dpi: 300

website:
  title: "Cole's TidyTuesday Archive"
  navbar:
    left:
      - text: "Home"
        file: index.qmd
      - text: "About"
        file: about.qmd
    right:
      - icon: github
        href: https://github.com/colebaril
        aria-label: GitHub
      - icon: bluesky
        href: https://bsky.app/profile/colebaril.ca
        aria-label: Bluesky
      - icon: linkedin
        href: https://linkedin.com/in/cole-baril/
        aria-label: LinkedIn
        
format:
  html:
    theme: simplex
    css: styles.css
    toc: true
    code-overflow: wrap




